server {
    listen 80;
    server_name grafana.tennisfolio.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name grafana.tennisfolio.net;

    ssl_certificate /etc/letsencrypt/live/api.tennisfolio.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.tennisfolio.net/privkey.pem;

    location / {
        allow 122.40.179.95;
        deny all;

        proxy_pass http://grafana:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
