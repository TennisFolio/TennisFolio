server {
    listen 80;
    server_name api.tennisfolio.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.tennisfolio.net;

    ssl_certificate /etc/letsencrypt/live/api.tennisfolio.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.tennisfolio.net/privkey.pem;

    location / {
       proxy_pass http://app:8080;
       proxy_set_header Host $host;
       proxy_set_header X-Real-IP $remote_addr;
       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
       proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://app:8080;   # Spring Boot가 띄운 포트
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;     # 24시간 연결 유지 가능
    }

}